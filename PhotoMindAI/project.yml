# XcodeGen spec for PhotoMind AI.
#
#   brew install xcodegen
#   cd PhotoMindAI && xcodegen generate
#   open PhotoMindAI.xcodeproj
#
# The project is defined declaratively here (rather than committing a churny .pbxproj) so the
# repo stays reviewable and CI can regenerate it deterministically. See docs/Release.md.

name: PhotoMindAI
options:
  bundleIdPrefix: com.photomind.ai
  deploymentTarget:
    iOS: "18.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    MARKETING_VERSION: "1.0.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: "" # ← set your Apple Developer Team ID (or configure in Xcode signing)
    CODE_SIGN_STYLE: Automatic
    ENABLE_USER_SCRIPT_SANDBOXING: YES

packages:
  GRDB:
    url: https://github.com/groue/GRDB.swift.git
    from: "6.29.0"

targets:
  PhotoMindAI:
    type: application
    platform: iOS
    sources:
      - path: PhotoMindAI
      - path: Shared
    dependencies:
      - package: GRDB
      - target: PhotoMindWidget
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.photomind.ai
        INFOPLIST_FILE: PhotoMindAI/Resources/Info.plist
        CODE_SIGN_ENTITLEMENTS: PhotoMindAI/Resources/PhotoMindAI.entitlements
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ENABLE_PREVIEWS: YES
        TARGETED_DEVICE_FAMILY: "1" # iPhone

  PhotoMindWidget:
    type: app-extension
    platform: iOS
    sources:
      - path: PhotoMindWidget
      - path: Shared
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.photomind.ai.widget
        INFOPLIST_FILE: PhotoMindWidget/Info.plist
        CODE_SIGN_ENTITLEMENTS: PhotoMindWidget/PhotoMindWidget.entitlements

  PhotoMindAITests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: Tests/PhotoMindAITests
    dependencies:
      - target: PhotoMindAI
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.photomind.ai.tests
        GENERATE_INFOPLIST_FILE: YES

schemes:
  PhotoMindAI:
    build:
      targets:
        PhotoMindAI: all
        PhotoMindWidget: all
    test:
      targets:
        - PhotoMindAITests
      gatherCoverageData: true
