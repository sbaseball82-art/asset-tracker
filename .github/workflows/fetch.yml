name: daily-asset-slide

on:
  schedule:
    # 毎日 22:00 UTC (= 07:00 JST 翌朝)。
    # 別minuteにして morning-brief(30 21) / daily-report(30 22) との同時実行を避ける。
    # ※このリポジトリはGitHubのcronが大幅に遅延する実績があるため、
    #   下のコミット手順は push 衝突に強い pull --rebase + リトライ方式にしている。
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: Fetch prices
        run: python fetch_prices.py

      - name: Fetch market events
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python fetch_events.py

      - name: Make slide images
        run: |
          python make_slide.py
          python make_allocation_slide.py

      - name: Upload slide artifacts
        uses: actions/upload-artifact@v4
        with:
          name: asset-slides
          path: |
            slide/slide.png
            slide/allocation.png
          retention-days: 30

      - name: Commit data & slides
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json events.json slide/slide.png slide/slide.html slide/allocation.png slide/allocation.html
          if git diff --staged --quiet; then
            echo "変更なし(コミットをスキップ)"
            exit 0
          fi
          git commit -m "update: $(date -u +%Y-%m-%d)"
          # 他の毎日ワークフロー(morning-brief / daily-report)と push が衝突しても
          # 更新を取りこぼさないよう、rebase してから push。失敗時は最大5回リトライ。
          for i in 1 2 3 4 5; do
            git pull --rebase origin "${GITHUB_REF_NAME}" && git push && { echo "push成功 (試行 $i)"; exit 0; }
            echo "::warning::push 衝突 (試行 $i)。5秒後に再試行"
            sleep 5
          done
          echo "::error::5回試行しても push できませんでした"
          exit 1
