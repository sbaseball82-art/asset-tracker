name: morning-brief

# 毎朝 6:30 JST（= 前日 21:30 UTC）に実行。
# ※このリポジトリではGitHubのcronが大幅に遅延する実績があるため、
#   確実な定時起動はClaudeの定時トリガーがworkflow_dispatchで行う。
#   このcronは「1日1回は必ず動く」ためのバックアップ。
on:
  schedule:
    - cron: "30 21 * * *"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: morning-brief
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"
          cache-dependency-path: morning-brief/requirements.txt

      - name: Install Japanese font (bold対応のNoto CJK)
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk

      - name: Install dependencies
        run: pip install -r morning-brief/requirements.txt

      - name: Generate 5 images + posts
        env:
          # 任意：設定すると投稿文をClaudeで自然化（未設定でもテンプレ文で動く）
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python morning-brief/scripts/main.py

      - name: Upload artifact (today's set)
        uses: actions/upload-artifact@v4
        with:
          name: morning-brief-latest
          path: morning-brief/output/latest/
          if-no-files-found: error

      - name: Commit outputs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          BRANCH="${GITHUB_REF_NAME}"

          # このrunの生成物を退避(このrunの成果が常に最新なので他コミットに勝たせる)
          cp -r morning-brief/output "$RUNNER_TEMP/mb-output-new"

          # rebase/merge を使わず「最新の origin を取り直して生成物を重ねる」方式
          # (daily_report.yml と同一の実績パターン)。画像(バイナリ)は rebase/merge で
          # 他ワークフローの同日コミットと衝突すると復旧不能で job が落ちるため。
          for i in 1 2 3 4 5; do
            git fetch origin "$BRANCH"
            git reset --hard
            git clean -fd morning-brief/output/
            git checkout -B "$BRANCH" "origin/$BRANCH"

            cp -r "$RUNNER_TEMP/mb-output-new/." morning-brief/output/

            git add -A morning-brief/output/
            if git diff --cached --quiet; then
              echo "変更なし。コミットしません。"
              exit 0
            fi
            git commit -m "chore: morning brief $(TZ=Asia/Tokyo date +%Y-%m-%d)"
            if git push origin "$BRANCH"; then
              echo "push 成功 (試行 $i)"
              exit 0
            fi
            echo "::warning::push が拒否されました (試行 $i)。5秒後に最新から再試行"
            sleep 5
          done
          echo "::error::5回試行しても push できませんでした"
          exit 1
