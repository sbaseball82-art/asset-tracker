name: daily-stock-report

on:
  schedule:
    # 毎日 07:30 JST (= 22:30 UTC 前日)。米国市場クローズ後・日本市場オープン前。
    - cron: '30 22 * * *'
  workflow_dispatch: {}   # 手動実行ボタン(テスト用)

permissions:
  contents: write

concurrency:
  group: daily-report
  cancel-in-progress: false

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - name: リポジトリ取得
        uses: actions/checkout@v4

      - name: Python セットアップ
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: stock-daily/requirements.txt

      - name: 日本語フォント インストール
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq fonts-noto-cjk

      - name: ライブラリ インストール
        run: pip install -r stock-daily/requirements.txt

      - name: レポート生成(最大3回リトライ)
        run: |
          python stock-daily/daily_report.py \
            || { echo "::warning::1回目失敗。2分後に再試行"; sleep 120; python stock-daily/daily_report.py; } \
            || { echo "::warning::2回目失敗。5分後に再試行"; sleep 300; python stock-daily/daily_report.py; }

      - name: 生成物をリポジトリにコミット
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add stock-daily/output/
          if git diff --cached --quiet; then
            echo "変更なし(コミットをスキップ)"
          else
            git commit -m "daily report $(TZ=Asia/Tokyo date +'%Y-%m-%d')"
            git pull --rebase origin "${GITHUB_REF_NAME}"
            git push
          fi

      - name: 画像をアーティファクトとしても保存
        uses: actions/upload-artifact@v4
        with:
          name: daily-report-${{ github.run_id }}
          path: |
            stock-daily/output/latest.png
            stock-daily/output/post_text.txt
          retention-days: 7
