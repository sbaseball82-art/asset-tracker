name: PhotoMind AI CI

# Builds and tests the PhotoMind AI iOS app. Scoped to the PhotoMindAI/ subfolder so it does
# not run for changes to the (unrelated) Python tooling elsewhere in this repo.
on:
  push:
    branches: [ main, "claude/**" ]
    paths: [ "PhotoMindAI/**", ".github/workflows/photomind-ci.yml" ]
  pull_request:
    paths: [ "PhotoMindAI/**", ".github/workflows/photomind-ci.yml" ]

concurrency:
  group: photomind-ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build-test:
    name: Build & Test
    runs-on: macos-15
    defaults:
      run:
        working-directory: PhotoMindAI
    steps:
      - uses: actions/checkout@v4

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_16.app

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Xcode project
        run: xcodegen generate

      - name: Resolve Swift packages
        run: xcodebuild -resolvePackageDependencies -project PhotoMindAI.xcodeproj -scheme PhotoMindAI

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -project PhotoMindAI.xcodeproj \
            -scheme PhotoMindAI \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -resultBundlePath TestResults.xcresult \
            CODE_SIGNING_ALLOWED=NO \
            | xcbeautify || xcodebuild test \
            -project PhotoMindAI.xcodeproj \
            -scheme PhotoMindAI \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: TestResults
          path: PhotoMindAI/TestResults.xcresult
          if-no-files-found: ignore
